<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Job Applier - Application Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #666;
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: scale(1.05);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-secondary.active {
            background: #667eea;
            color: white;
        }

        .applications-list {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .app-card {
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            position: relative;
        }

        .app-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .app-title {
            flex: 1;
            min-width: 300px;
        }

        .job-title {
            font-size: 1.4em;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .company {
            color: #667eea;
            font-size: 1.1em;
            font-weight: 600;
        }

        .location {
            color: #888;
            font-size: 0.95em;
            margin-top: 5px;
        }

        .match-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            font-size: 1.8em;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .match-excellent { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .match-good { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .match-weak { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .match-poor { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }

        .app-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
            flex-wrap: wrap;
            gap: 15px;
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-applied {
            background: #d4edda;
            color: #155724;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-rejected {
            background: #f8d7da;
            color: #721c24;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 0.9em;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-info {
            background: #17a2b8;
            color: white;
        }

        .btn-info:hover {
            background: #138496;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .empty-state h3 {
            font-size: 1.8em;
            margin-bottom: 15px;
            color: #667eea;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 15px;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .modal-title {
            font-size: 1.6em;
            color: #667eea;
            font-weight: bold;
        }

        .close {
            font-size: 2em;
            cursor: pointer;
            color: #888;
            transition: color 0.3s;
        }

        .close:hover {
            color: #333;
        }

        .cover-letter-text {
            white-space: pre-wrap;
            line-height: 1.8;
            color: #333;
            font-size: 1.05em;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 1.2em;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .app-header {
                flex-direction: column;
            }

            .match-badge {
                width: 80px;
                height: 80px;
                font-size: 1.4em;
            }
        }

        .refresh-icon {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 AI Job Applier</h1>
            <p class="subtitle">Track Your Applications with AI-Powered Insights</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="stat-total">0</div>
                <div class="stat-label">Total Jobs</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-applied">0</div>
                <div class="stat-label">Applied</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-pending">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-rejected">0</div>
                <div class="stat-label">Rejected</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-avg">0%</div>
                <div class="stat-label">Avg Match</div>
            </div>
        </div>

        <div class="controls">
            <div class="filter-group">
                <button class="btn btn-secondary active" onclick="filterStatus('ALL')">All</button>
                <button class="btn btn-secondary" onclick="filterStatus('PENDING_MANUAL')">Pending</button>
                <button class="btn btn-secondary" onclick="filterStatus('APPLIED')">Applied</button>
                <button class="btn btn-secondary" onclick="filterStatus('REJECTED')">Rejected</button>
            </div>
            <button class="btn btn-primary" onclick="loadData()">
                <span id="refresh-icon">🔄</span> Refresh
            </button>
        </div>

        <div class="applications-list">
            <div id="apps-container" class="loading">
                Loading applications...
            </div>
        </div>
    </div>

    <!-- Cover Letter Modal -->
    <div id="coverLetterModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Cover Letter</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div id="coverLetterContent" class="cover-letter-text"></div>
        </div>
    </div>

    <script>
        let allApplications = [];
        let currentFilter = 'ALL';

        // Load data on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

        async function loadData() {
            const refreshIcon = document.getElementById('refresh-icon');
            refreshIcon.classList.add('refresh-icon');

            try {
                // Load stats
                const statsResponse = await fetch('/api/tracker/stats');
                const stats = await statsResponse.json();
                
                document.getElementById('stat-total').textContent = stats.total;
                document.getElementById('stat-applied').textContent = stats.applied;
                document.getElementById('stat-pending').textContent = stats.pending;
                document.getElementById('stat-rejected').textContent = stats.rejected;
                document.getElementById('stat-avg').textContent = stats.averageScore + '%';

                // Load applications
                const appsResponse = await fetch('/api/tracker/applications');
                allApplications = await appsResponse.json();
                
                renderApplications(allApplications);
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('apps-container').innerHTML = 
                    '<div class="empty-state"><h3>Error loading data</h3><p>Please try refreshing the page.</p></div>';
            } finally {
                refreshIcon.classList.remove('refresh-icon');
            }
        }

        function filterStatus(status) {
            currentFilter = status;
            
            // Update button states
            document.querySelectorAll('.filter-group .btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Filter and render
            const filtered = status === 'ALL' 
                ? allApplications 
                : allApplications.filter(app => app.status === status);
            
            renderApplications(filtered);
        }

        function renderApplications(apps) {
            const container = document.getElementById('apps-container');
            
            if (apps.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No Applications Found</h3>
                        <p>Start analyzing jobs to see them here!</p>
                        <p style="margin-top: 20px;">
                            <a href="/api/jobs/analyze/help" target="_blank" 
                               style="color: #667eea; text-decoration: underline;">
                               View API Documentation
                            </a>
                        </p>
                    </div>
                `;
                return;
            }

            container.innerHTML = apps.map(app => {
                const matchClass = getMatchClass(app.matchScore);
                const statusClass = `status-${app.status.toLowerCase().replace('_', '-')}`;
                
                return `
                    <div class="app-card">
                        <div class="app-header">
                            <div class="app-title">
                                <div class="job-title">${app.title || 'Unknown Title'}</div>
                                <div class="company">${app.company || 'Unknown Company'}</div>
                                <div class="location">📍 ${app.location || 'Location not specified'}</div>
                            </div>
                            <div class="match-badge ${matchClass}">
                                ${app.matchScore}%
                            </div>
                        </div>
                        
                        <div class="app-footer">
                            <span class="status-badge ${statusClass}">
                                ${formatStatus(app.status)}
                            </span>
                            
                            <div class="action-buttons">
                                ${app.jobUrl ? `
                                    <button class="btn btn-small btn-info" 
                                            onclick="window.open('${app.jobUrl}', '_blank')">
                                        🔗 View Job
                                    </button>
                                ` : ''}
                                
                                ${app.hasCoverLetter ? `
                                    <button class="btn btn-small btn-primary" 
                                            onclick="showCoverLetter(${app.id})">
                                        📄 Cover Letter
                                    </button>
                                ` : ''}
                                
                                ${app.status === 'PENDING_MANUAL' ? `
                                    <button class="btn btn-small btn-success" 
                                            onclick="updateStatus(${app.id}, 'APPLIED')">
                                        ✅ Mark Applied
                                    </button>
                                ` : ''}
                                
                                ${app.status !== 'REJECTED' ? `
                                    <button class="btn btn-small btn-danger" 
                                            onclick="updateStatus(${app.id}, 'REJECTED')">
                                        ❌ Reject
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getMatchClass(score) {
            if (score >= 80) return 'match-excellent';
            if (score >= 60) return 'match-good';
            if (score >= 40) return 'match-weak';
            return 'match-poor';
        }

        function formatStatus(status) {
            return status.replace('_', ' ').replace('MANUAL', '');
        }

        async function showCoverLetter(id) {
            try {
                const response = await fetch(`/api/tracker/cover-letter/${id}`);
                const data = await response.json();
                
                if (data.coverLetter) {
                    document.getElementById('coverLetterContent').textContent = data.coverLetter;
                    document.getElementById('coverLetterModal').style.display = 'block';
                } else {
                    alert('Cover letter not available');
                }
            } catch (error) {
                console.error('Error loading cover letter:', error);
                alert('Error loading cover letter');
            }
        }

        async function updateStatus(id, newStatus) {
            try {
                const response = await fetch(`/api/tracker/status/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: newStatus })
                });
                
                const result = await response.json();
                
                if (result.message) {
                    // Reload data to reflect changes
                    await loadData();
                } else {
                    alert('Error updating status');
                }
            } catch (error) {
                console.error('Error updating status:', error);
                alert('Error updating status');
            }
        }

        function closeModal() {
            document.getElementById('coverLetterModal').style.display = 'none';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('coverLetterModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
